services:

  # ── Traefik — reverse proxy + TLS ──────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - traefik_public
    labels:
      - "traefik.enable=false"

  # ── Next.js app ─────────────────────────────────────────────
  app:
    image: zou34/itinup:latest
    container_name: itinuppro
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.local
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"

      # ── Service port ──
      - "traefik.http.services.app.loadbalancer.server.port=3000"

      # ── HTTP → HTTPS redirect (port 80) ──
      - "traefik.http.routers.app-http.rule=Host(`itinup.com`) || Host(`www.itinup.com`)"
      - "traefik.http.routers.app-http.entrypoints=web"
      - "traefik.http.routers.app-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

      # ── HTTPS apex (port 443) ──
      - "traefik.http.routers.app.rule=Host(`itinup.com`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app.service=app"

      # ── www → apex redirect (port 443) ──
      - "traefik.http.routers.www-redirect.rule=Host(`www.itinup.com`)"
      - "traefik.http.routers.www-redirect.entrypoints=websecure"
      - "traefik.http.routers.www-redirect.tls=true"
      - "traefik.http.routers.www-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.www-redirect.middlewares=www-to-apex"
      - "traefik.http.middlewares.www-to-apex.redirectregex.regex=^https://www\\.itinup\\.com/(.*)"
      - "traefik.http.middlewares.www-to-apex.redirectregex.replacement=https://itinup.com/$${1}"
      - "traefik.http.middlewares.www-to-apex.redirectregex.permanent=true"

    depends_on:
      - traefik

networks:
  traefik_public:
    name: traefik_public
    external: false

volumes:
  letsencrypt: