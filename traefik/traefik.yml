# ── Traefik static configuration ──────────────────────────────

api:
  dashboard: false

log:
  level: INFO

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

providers:
  docker:
    exposedByDefault: false
    network: traefik_public

certificatesResolvers:
  letsencrypt:
    acme:
      email: contact@itinup.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
